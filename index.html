<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Curiosity OS</title>
    <meta name="description" content="A personal operating system for curiosity — capture, resume, connect, and evolve thinking over time." />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#f9f9f7" />

    <!-- Installable web app (iPhone / iPad / Android home screen) -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="./assets/icon.svg" />
    <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" />
    <meta name="application-name" content="Curiosity OS" />
    <meta name="apple-mobile-web-app-title" content="Curiosity" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap"
    />
    <link rel="stylesheet" href="./app/styles/tokens.css" />
    <link rel="stylesheet" href="./app/styles/base.css" />
    <link rel="stylesheet" href="./app/styles/app.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="topbar">
      <a class="topbar__brand" href="#/" aria-label="Curiosity OS — home">
        <span class="topbar__mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2c.45 5.1 3.4 8.05 8.5 8.5-5.1.45-8.05 3.4-8.5 8.5-.45-5.1-3.4-8.05-8.5-8.5C8.6 10.05 11.55 7.1 12 2Z" />
          </svg>
        </span>
        <span class="topbar__name">Curiosity OS</span>
      </a>
      <a class="topbar__search" href="#/browse" data-action="search" aria-label="Search the library">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5 21 21"/></svg>
      </a>
    </header>

    <aside class="sidenav" aria-label="Primary navigation">
      <a class="sidenav__brand" href="#/" aria-label="Curiosity OS — home">
        <span class="sidenav__mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2c.45 5.1 3.4 8.05 8.5 8.5-5.1.45-8.05 3.4-8.5 8.5-.45-5.1-3.4-8.05-8.5-8.5C8.6 10.05 11.55 7.1 12 2Z" />
          </svg>
        </span>
        <span class="sidenav__name">Curiosity OS</span>
      </a>

      <nav class="sidenav__nav" aria-label="Sections">
        <a class="sidenav__link" href="#/" data-route="home">
          <span class="sidenav__ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11.5 12 5l8 6.5"/><path d="M6 10.2V19h12v-8.8"/></svg></span>
          <span class="sidenav__label">Home</span>
        </a>
        <a class="sidenav__link" href="#/browse" data-route="browse">
          <span class="sidenav__ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M12 6c-1.5-1.2-3.6-2-6-2H4v13h2c2.4 0 4.5.8 6 2 1.5-1.2 3.6-2 6-2h2V4h-2c-2.4 0-4.5.8-6 2z"/><path d="M12 6v13"/></svg></span>
          <span class="sidenav__label">Library</span>
        </a>
        <a class="sidenav__link" href="#/capture" data-route="capture">
          <span class="sidenav__ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg></span>
          <span class="sidenav__label">Capture</span>
        </a>
        <button class="sidenav__link sidenav__link--publish" type="button" data-action="publish">
          <span class="sidenav__ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V4"/><path d="m7.5 8.5 4.5-4.5 4.5 4.5"/><path d="M5 16v3h14v-3"/></svg></span>
          <span class="sidenav__label">Publish</span>
        </button>
      </nav>
    </aside>

    <main id="main" class="view" tabindex="-1">
      <!-- Views are rendered here by app/scripts/app.js -->
    </main>

    <noscript>
      <p style="padding: 2rem; text-align: center">
        Curiosity OS is a quiet reader for your repository of ideas. It needs
        JavaScript to turn the Markdown and JSON in this repo into something
        beautiful to read.
      </p>
    </noscript>

    <script type="module" src="./app/scripts/app.js"></script>
  </body>
</html>
